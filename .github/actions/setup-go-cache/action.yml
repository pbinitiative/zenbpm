name: "Setup Go with tool cache"
description: "Sets up Go and restores the shared build/module/bin cache used by the static-analysis workflows."

inputs:
  go-version:
    description: "Go version to install."
    required: false
    default: "1.26"
  cache-key:
    description: "Primary cache key."
    required: true
  restore-keys:
    description: "Newline-separated fallback restore keys."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: setup go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go-version }}

    - name: setup golang caches
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
          ${{ github.workspace }}/bin
        key: ${{ inputs.cache-key }}
        restore-keys: ${{ inputs.restore-keys }}

