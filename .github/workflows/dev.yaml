name: dev

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  dev:
    uses: ./.github/workflows/release-reusable.yaml
    with:
      release-command: make release-dev
      release-tag: dev-${{ github.sha }}
      checkout-ref: ${{ github.ref }}
      artifact-prefix: trivy-dev-reports
      publish: true
      security-scan: false
      notify: false
    secrets: inherit
