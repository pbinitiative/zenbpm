name: gosec

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  GOSEC_VERSION: v2.27.1

jobs:
  gosec:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: setup golang caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            ~/work/zenbpm/zenbpm/bin
          key: ${{ runner.os }}-gosec-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-gosec-

      - name: install gosec
        run: make gosec

      - name: run gosec
        run: bin/gosec -exclude-generated -no-fail -fmt sarif -out gosec.sarif ./...

      - name: upload gosec sarif
        if: ${{ always() && hashFiles('gosec.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gosec.sarif
          category: gosec
