name: gosec

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  GOSEC_VERSION: v2.27.1

jobs:
  gosec:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: setup golang caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            ${{ github.workspace }}/bin
          key: ${{ runner.os }}-gosec-${{ env.GOSEC_VERSION }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-gosec-

      - name: install gosec
        run: make gosec

      - name: run gosec
        run: |
          mkdir -p gosec-reports
          bin/gosec -exclude-generated -no-fail -fmt sarif -out gosec-reports/gosec.sarif ./...

      - name: upload gosec sarif
        if: ${{ always() && hashFiles('gosec-reports/gosec.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gosec-reports/gosec.sarif
          category: gosec

      - name: upload gosec reports
        if: ${{ always() && hashFiles('gosec-reports/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: gosec-reports-${{ github.run_id }}
          path: gosec-reports/
          retention-days: 90
