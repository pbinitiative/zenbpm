name: release orchestrator

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version with v prefix, for example v2.0.0.
        required: true
        type: string

permissions:
  contents: write
  actions: read
  pull-requests: write
  security-events: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

env:
  ORG: pbinitiative
  BACKEND_REPO: zenbpm
  FRONTEND_REPO: zenbpm-ui
  JAVA_CLIENT_REPO: zenbpm-java-client
  DOCS_REPO: zenbpm-docusaurus
  VERSION: ${{ inputs.version }}

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      release-tag: ${{ steps.release-vars.outputs.release-tag }}
      release-branch: ${{ steps.release-vars.outputs.release-branch }}
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Export release variables
        id: release-vars
        run: scripts/ci/release-orchestrator.sh export-release-vars

      - name: Create release app token
        id: release-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID_ZENBPM_RELEASE }}
          private-key: ${{ secrets.APP_PRIVATE_KEY_ZENBPM_RELEASE }}
          owner: ${{ env.ORG }}
          repositories: |
            ${{ env.BACKEND_REPO }}
            ${{ env.FRONTEND_REPO }}
            ${{ env.JAVA_CLIENT_REPO }}
            ${{ env.DOCS_REPO }}

      - name: Validate release version format
        run: scripts/ci/release-orchestrator.sh validate-version-format

      - name: Validate release tags do not exist
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: scripts/ci/release-orchestrator.sh validate-tags

      - name: Create or update backend release branch
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: scripts/ci/release-orchestrator.sh prepare-backend-branch

      - name: Bump OpenAPI version on release branch
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: scripts/ci/release-orchestrator.sh bump-backend-openapi-version

      - name: Create release pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/ci/release-orchestrator.sh ensure-release-pr

      - name: Validate OpenAPI version
        run: scripts/ci/release-orchestrator.sh validate-openapi-version

  prepare-and-test:
    runs-on: ubuntu-latest
    needs: validate
    env:
      RELEASE_BRANCH: ${{ needs.validate.outputs.release-branch }}
    steps:
      - name: Checkout backend release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.release-branch }}
          fetch-depth: 0

      - name: Create release app token
        id: release-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID_ZENBPM_RELEASE }}
          private-key: ${{ secrets.APP_PRIVATE_KEY_ZENBPM_RELEASE }}
          owner: ${{ env.ORG }}
          repositories: |
            ${{ env.BACKEND_REPO }}
            ${{ env.FRONTEND_REPO }}
            ${{ env.JAVA_CLIENT_REPO }}
            ${{ env.DOCS_REPO }}

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ORG }}/${{ env.FRONTEND_REPO }}
          token: ${{ steps.release-app-token.outputs.token }}
          path: zenbpm-ui
          fetch-depth: 0

      - name: Prepare frontend release branch
        working-directory: zenbpm-ui
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: ../scripts/ci/release-orchestrator.sh prepare-frontend-branch

      - name: Sync backend OpenAPI into frontend
        run: cp openapi/api.yaml zenbpm-ui/openapi/api.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: zenbpm-ui/package.json

      - name: Setup frontend Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: zenbpm-ui/.nvmrc
          cache: pnpm
          cache-dependency-path: zenbpm-ui/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: zenbpm-ui
        run: pnpm install --frozen-lockfile

      - name: Generate frontend API client
        working-directory: zenbpm-ui
        run: pnpm generate:api

      - name: Commit and push frontend release branch
        working-directory: zenbpm-ui
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: ../scripts/ci/release-orchestrator.sh commit-frontend-release-branch

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Playwright browsers
        working-directory: zenbpm-ui
        run: pnpm exec playwright install --with-deps chromium

      - name: Run pre-image smoke tests
        working-directory: zenbpm-ui
        run: |
          # Future real-backend smoke path:
          # cd ..
          # cleanup() {
          #   kill "${frontend_pid:-}" "${backend_pid:-}" 2>/dev/null || true
          #   wait "${frontend_pid:-}" "${backend_pid:-}" 2>/dev/null || true
          # }
          # trap cleanup EXIT
          # PROFILE=DEV CONFIG_FILE="$PWD/conf/zenbpm/conf-dev.yaml" LOG_LEVEL=INFO POLL_TIMER_DELAY_SECONDS=1 go run ./cmd/zenbpm >release-smoke-backend.log 2>&1 &
          # backend_pid=$!
          # until curl -fsS http://localhost:8080/system/status >/dev/null; do sleep 1; done
          # cd zenbpm-ui
          # pnpm dev:live -- --host 127.0.0.1 >../release-smoke-frontend.log 2>&1 &
          # frontend_pid=$!
          # until curl -fsS http://localhost:3000 >/dev/null; do sleep 1; done
          # pnpm test:e2e:live
          # For now the release gate uses the existing mocked Playwright suite.
          pnpm test:e2e

  backend-release:
    needs:
      - validate
      - prepare-and-test
      - create-release-tags
    uses: ./.github/workflows/release-reusable.yaml
    with:
      release-command: make release
      release-tag: ${{ needs.validate.outputs.release-tag }}
      checkout-ref: ${{ needs.validate.outputs.release-tag }}
      artifact-prefix: trivy-release-reports
      publish: true
      security-scan: true
      notify: true
    secrets: inherit

  create-release-tags:
    runs-on: ubuntu-latest
    needs:
      - validate
      - prepare-and-test
    env:
      RELEASE_BRANCH: ${{ needs.validate.outputs.release-branch }}
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Create release app token
        id: release-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID_ZENBPM_RELEASE }}
          private-key: ${{ secrets.APP_PRIVATE_KEY_ZENBPM_RELEASE }}
          owner: ${{ env.ORG }}
          repositories: |
            ${{ env.BACKEND_REPO }}
            ${{ env.FRONTEND_REPO }}

      - name: Tag backend tested commit
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: scripts/ci/release-orchestrator.sh tag-backend

      - name: Tag frontend tested commit
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: scripts/ci/release-orchestrator.sh tag-frontend

  frontend-release:
    runs-on: ubuntu-latest
    needs:
      - validate
      - backend-release
    env:
      RELEASE_BRANCH: ${{ needs.validate.outputs.release-branch }}
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Create release app token
        id: release-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID_ZENBPM_RELEASE }}
          private-key: ${{ secrets.APP_PRIVATE_KEY_ZENBPM_RELEASE }}
          owner: ${{ env.ORG }}
          repositories: |
            ${{ env.FRONTEND_REPO }}

      - name: Dispatch frontend release
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: scripts/ci/release-orchestrator.sh dispatch-frontend-release

      - name: Wait for frontend release
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: scripts/ci/release-orchestrator.sh wait-frontend-release

  java-client-release:
    runs-on: ubuntu-latest
    needs:
      - validate
      - frontend-release
    if: ${{ success() }}
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Create release app token
        id: release-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID_ZENBPM_RELEASE }}
          private-key: ${{ secrets.APP_PRIVATE_KEY_ZENBPM_RELEASE }}
          owner: ${{ env.ORG }}
          repositories: |
            ${{ env.JAVA_CLIENT_REPO }}

      - name: Dispatch java client release
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: scripts/ci/release-orchestrator.sh dispatch-java-client-release

  docs-release:
    runs-on: ubuntu-latest
    needs:
      - validate
      - frontend-release
    if: ${{ success() }}
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Create release app token
        id: release-app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID_ZENBPM_RELEASE }}
          private-key: ${{ secrets.APP_PRIVATE_KEY_ZENBPM_RELEASE }}
          owner: ${{ env.ORG }}
          repositories: |
            ${{ env.DOCS_REPO }}

      - name: Dispatch documentation versioning
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: scripts/ci/release-orchestrator.sh dispatch-docs-release

  notify-result:
    runs-on: ubuntu-latest
    needs:
      - validate
      - prepare-and-test
      - create-release-tags
      - backend-release
      - frontend-release
      - java-client-release
      - docs-release
    if: ${{ always() }}
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RELEASE_RESULT: ${{ contains(needs.*.result, 'failure') && 'failed' || contains(needs.*.result, 'cancelled') && 'cancelled' || 'succeeded' }}
        run: scripts/ci/release-orchestrator.sh notify-discord
