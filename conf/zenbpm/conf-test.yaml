name: zenbpm
httpServer:
  context: /
  addr: :8080
grpcServer:
  addr: :9090
cluster:
  addr: localhost:8090
  adv: localhost:8090
  raft:
    dir: test-node-1
    bootstrapExpect: 1
    bootstrapExpectTimeout: 30m
    joinAttempts: 5
    joinAddresses:
      - localhost:8090
  nodeId: test-node-1
  persistence:
    # Keep finished instances around: tests assert on completed/cancelled
    # instances and delete them explicitly. Without a TTL the background
    # cleanup purges finished instances on its next tick, racing the tests.
    instanceHistoryTTL: 24h
  script:
    feel:
      maxVmPoolSize: 10
      minVmPoolSize: 2
    js:
      maxVmPoolSize: 10
      minVmPoolSize: 2
